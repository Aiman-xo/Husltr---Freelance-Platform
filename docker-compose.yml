version: '3.8'

services:
  # 1. The Database (PostgreSQL)
  db:
    image: postgres:15
    restart: always
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - ./Hustlr-backend/.env  # This file must contain POSTGRES_USER, POSTGRES_PASSWORD, etc.
    # Note: I removed the "environment:" block because it was causing the "empty" error

  # 2. The Redis Service
  redis:
    image: redis:7-alpine
    restart: always

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq_container
    restart: always
    ports:
      - "15672:15672" # Management UI (Login: guest/guest)
    # We don't expose 5672 to the world, only to our containers
    networks:
      - default

  # 3. Your Django API
  backend:
    build: ./Hustlr-backend
    restart: always
    volumes:
      - ./Hustlr-backend:/app
      - ./Hustlr-backend/logs:/app/logs
    # ports:
    #   - "8000:8000"
    env_file:
      - ./Hustlr-backend/.env
    depends_on:
      - redis

  # 4. The Celery Worker
  worker:
    build: ./Hustlr-backend
    command: celery -A hustlr worker --loglevel=info
    volumes:
      - ./Hustlr-backend:/app
      - ./Hustlr-backend/logs:/app/logs
    env_file:
      - ./Hustlr-backend/.env
    environment:
      - DB_HOST=db
    depends_on:
      - db
      - redis
      - backend
  beat:
    build: ./Hustlr-backend
    command: celery -A hustlr beat --loglevel=info
    volumes:
      - ./Hustlr-backend:/app
    env_file:
      - ./Hustlr-backend/.env
    environment:
      - DB_HOST=db
    depends_on:
      - db
      - redis
      - backend

  #chat websockets
  chat-service:
    build:
      context: ./Hustlr-websockets
    container_name: hustlr_chat
    restart: always
    # ports:
    #   - "8001:8001"
    env_file:
      - ./Hustlr-backend/.env
    environment:
      - DJANGO_SETTINGS_MODULE=websocketproject.settings
    command: daphne -b 0.0.0.0 -p 8001 websocketproject.asgi:application
    volumes:
      - ./Hustlr-websockets:/app
    depends_on:
      - redis

  ai-service:
    build: ./Hustlr-AI
    container_name: hustlr_ai
    restart: always
    volumes:
      - ./Hustlr-AI:/app  # Add this for instant code updates!
    # ports:
    #   - "8002:8002"
    env_file:
      - ./Hustlr-backend/.env
    depends_on:
      - rabbitmq
  
  n8n:
    image: n8nio/n8n:latest
    container_name: hustlr_n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      # set up configuration like use which host, which type of database etc...
      - N8N_HOST=localhost
      - NODE_ENV=production
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=aws-1-ap-south-1.pooler.supabase.com #db  
      - DB_POSTGRESDB_PORT=6543 #5432 
      # Use the variables from your existing .env file
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB} 
      - DB_POSTGRESDB_USER=${POSTGRES_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_POSTGRESDB_SSL_REJECT_UNAUTHORIZED=false
    volumes:
      - n8n_data:/home/node/.n8n
    env_file:
      - ./Hustlr-backend/.env
  
  
  nginx:
    image: nginx:alpine
    container_name: hustlr_gateway
    restart: always
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"  # This is now your ONLY open door
    depends_on:
      - backend
      - chat-service
      - ai-service

volumes:
  postgres_data:
  n8n_data: