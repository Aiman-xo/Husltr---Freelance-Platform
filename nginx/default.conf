upstream backend_api {
    server backend:8000;
}

upstream chat_service {
    server chat-service:8001;
}

upstream ai_service {
    server ai-service:8002;
}

upstream n8n_service {
    server hustlr_n8n:5678;
}

server {
    listen 80;

    client_max_body_size 10M;
    client_body_buffer_size 10M;
    proxy_read_timeout 300;

    # 3. FASTAPI AI SERVICE (New!)
    location /ai/ {
        # The trailing slash after :8002/ is important! 
        # It strips "/ai/" from the request before sending it to FastAPI.
        proxy_pass http://ai_service; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 1. Standard API and Admin traffic
    location / {
        proxy_pass http://backend_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 2. WebSocket traffic (The Chat)
    location /ws/ {
        proxy_pass http://chat_service;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }

    # 4. n8n Automation Interface
    location /n8n/ {
        proxy_pass http://n8n_service/; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # Required for n8n's real-time UI updates
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
    }

    
   
}